
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desenhos Antigos - Streaming</title>

    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📺</text></svg>">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER PREMIUM -->
<header class="header">
    <div class="logo">🎬 NostalgiaTV</div>

    <nav>
        <a href="#">Início</a>
        <a href="#">Categorias</a>
        <a href="#">Minha Lista</a>
    </nav>

    <div class="header-right">
        <input type="text" id="inputBusca" placeholder="Buscar..." oninput="filtrarDesenhos()">

        <div id="auth-controls">
            <button id="btnLogar" onclick="abrirModalLogin()">🔒</button>
            <button id="btnSair" onclick="fazerLogout()" style="display:none;">Sair</button>
        </div>
    </div>
</header>

<!-- BANNER CINEMATOGRÁFICO -->
<section id="banner">
    <div class="overlay"></div>

    <div id="player-container" style="display:none;"></div>

    <div id="banner-info">
        <h2 id="banner-titulo">Bem-vindo</h2>
        <p id="banner-desc">Selecione um desenho abaixo para assistir.</p>

        <div class="banner-buttons">
            <button id="btnAssistir" onclick="iniciarVideo()" style="display:none;">▶ Assistir</button>
            <button onclick="assistirAlgoAleatorio()">🎲 Surpreenda-me</button>
        </div>
    </div>
</section>

<!-- CONTROLES -->
<div class="controles-container">
    <button id="btnAbrirModal" class="admin-only" onclick="abrirModal()">➕ Novo Desenho</button>
</div>

<!-- CONTEÚDO PRINCIPAL -->
<main>

    <section class="linha">
        <h2>🔥 Em Destaque</h2>
        <div class="carrossel" id="destaques"></div>
    </section>

    <section class="linha">
        <h2>📺 Populares</h2>
        <div class="carrossel" id="populares"></div>
    </section>

    <section class="linha">
        <h2>🕰️ Por Década</h2>
        <div id="secoes-decadas"></div>
    </section>

</main>

<!-- MODAL LOGIN -->
<div id="modalLogin" class="modal">
    <div class="modal-content" style="max-width: 350px;">
        <span class="fechar" onclick="fecharModalLogin()">&times;</span>
        <h2>Acesso ADM</h2>
        <form id="formLogin">
            <div class="grupo-input">
                <label for="login_user">Usuário</label>
                <input type="text" id="login_user" required>
            </div>

            <div class="grupo-input">
                <label for="senha_user">Senha</label>
                <input type="password" id="senha_user" required>
            </div>

            <button type="submit">Entrar</button>
        </form>
    </div>
</div>

<!-- MODAL CADASTRO -->
<div id="modalCadastro" class="modal">
    <div class="modal-content">

        <span class="fechar" onclick="fecharModal()">&times;</span>

        <h2 id="modal-titulo">Adicionar Desenho</h2>

        <form id="formDesenho" enctype="multipart/form-data">

            <input type="hidden" id="edit_id">

            <div class="grupo-input">
                <label>Título</label>
                <input type="text" id="nome" name="nome" required>
            </div>

            <div class="grupo-input">
                <label>Ano</label>
                <input type="number" id="ano" name="ano" required>
            </div>

            <div class="grupo-input">
                <label>Descrição</label>
                <textarea id="descricao" name="descricao" required></textarea>
            </div>

            <div class="grupo-input">
                <label>URL do Vídeo</label>
                <input type="text" id="video_url" name="video_url">
            </div>

            <div class="file-input-wrapper">
                <label>Capa</label>
                <input type="file" id="imagem" name="imagem" accept="image/*" onchange="previewImagem(event)">
            </div>

            <div id="container-preview" style="display:none;">
                <img id="img-preview">
            </div>

            <button type="submit">Salvar</button>
        </form>

    </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- FOOTER -->
<footer>
    <p>&copy; 2026 NostalgiaTV</p>
</footer>

<script src="script.js"></script>
</body>
</html>
